<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Terminal Translator</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #terminal-container {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    #terminal-container .xterm {
      height: 100%;
      padding: 4px;
    }
    #divider {
      height: 3px;
      background: #45475a;
      cursor: row-resize;
      flex-shrink: 0;
    }
    #translate-panel {
      height: 200px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      background: #181825;
      border-top: 1px solid #313244;
    }
    #translate-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #1e1e2e;
      border-bottom: 1px solid #313244;
      font-size: 12px;
      color: #a6adc8;
      flex-shrink: 0;
    }
    #translate-header .title {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #translate-header .status {
      font-size: 11px;
      color: #6c7086;
    }
    #translate-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #translate-content .line {
      padding: 2px 0;
      border-bottom: 1px solid #11111b;
    }
    #translate-content .line .original {
      color: #6c7086;
      font-size: 11px;
    }
    #translate-content .line .translated {
      color: #cdd6f4;
    }
    #translate-content .streaming {
      color: #89b4fa;
    }
    #api-config {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #api-config.hidden { display: none; }
    #api-config .dialog {
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 8px;
      padding: 24px;
      width: 420px;
    }
    #api-config h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #cdd6f4;
    }
    #api-config label {
      display: block;
      font-size: 12px;
      color: #a6adc8;
      margin-bottom: 4px;
    }
    #api-config input {
      width: 100%;
      padding: 8px 10px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 4px;
      color: #cdd6f4;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }
    #api-config input:focus { border-color: #89b4fa; }
    #api-config select {
      width: 100%;
      padding: 8px 10px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 4px;
      color: #cdd6f4;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
      cursor: pointer;
    }
    #api-config select:focus { border-color: #89b4fa; }
    .toolbar-btn {
      background: none;
      border: 1px solid #45475a;
      color: #a6adc8;
      cursor: pointer;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .toolbar-btn:hover { color: #cdd6f4; background: #313244; border-color: #585b70; }
    .toolbar-btn.active { color: #a6e3a1; border-color: #a6e3a1; }
    #translate-header .right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #api-config button {
      width: 100%;
      padding: 8px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #api-config button:hover { background: #74c7ec; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="terminal-container"></div>
  <div id="divider"></div>
  <div id="translate-panel">
    <div id="translate-header">
      <div class="title">📝 实时翻译</div>
      <div class="right">
        <div class="status" id="translate-status">等待输出...</div>
        <button id="pause-btn" class="toolbar-btn" title="暂停翻译">⏸ 暂停</button>
        <button id="snap-btn" class="toolbar-btn" title="翻译当前屏幕">📋 翻译当前屏幕</button>
        <button id="clear-btn" class="toolbar-btn" title="清空翻译">🗑 清空</button>
        <button id="settings-btn" class="toolbar-btn" title="设置">⚙ 设置</button>
      </div>
    </div>
    <div id="translate-content"></div>
  </div>

  <div id="api-config">
    <div class="dialog">
      <h2>🔑 配置翻译 API</h2>
      <label>模型预设</label>
      <select id="api-preset">
        <option value="deepseek">DeepSeek (推荐)</option>
        <option value="openai">OpenAI</option>
        <option value="kimi">Kimi (月之暗面)</option>
        <option value="qwen">通义千问</option>
        <option value="ollama">Ollama (本地)</option>
        <option value="custom">自定义</option>
      </select>
      <label>API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-..." />
      <label>API Base URL</label>
      <input type="text" id="api-base-input" placeholder="https://api.deepseek.com" />
      <label>模型名称</label>
      <input type="text" id="api-model-input" placeholder="deepseek-chat" />
      <button id="api-save-btn">保存并开始</button>
    </div>
  </div>

  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
